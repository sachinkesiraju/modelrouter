services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs:ro
      - traces:/data
    environment:
      # Provider keys for litellm backends; set the ones your routes use.
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - TOGETHERAI_API_KEY
    command: ["modelrouter", "serve", "--config", "configs/routes.example.yaml",
              "--host", "0.0.0.0", "--port", "8080", "--traces", "/data/traces.jsonl"]

volumes:
  traces:
