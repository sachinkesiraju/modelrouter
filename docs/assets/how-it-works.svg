<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="360" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- Prompt -->
  <rect x="24" y="104" width="130" height="56" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="89" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Prompt</text>
  <text x="89" y="146" text-anchor="middle" font-size="11" fill="#64748b">OpenAI-compatible API</text>

  <line x1="154" y1="132" x2="196" y2="132" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Router -->
  <rect x="198" y="86" width="176" height="92" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="286" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#312e81">Router</text>
  <text x="286" y="130" text-anchor="middle" font-size="11" fill="#4338ca">"Which model is capable?"</text>
  <text x="286" y="148" text-anchor="middle" font-size="11" fill="#4338ca">prompt embedding · scores</text>
  <text x="286" y="164" text-anchor="middle" font-size="11" fill="#4338ca">task latent z</text>

  <line x1="374" y1="132" x2="416" y2="132" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Policy -->
  <rect x="418" y="86" width="170" height="92" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="503" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">Policy</text>
  <text x="503" y="130" text-anchor="middle" font-size="11" fill="#9a3412">cheapest model that</text>
  <text x="503" y="146" text-anchor="middle" font-size="11" fill="#9a3412">clears the quality bar</text>
  <text x="503" y="164" text-anchor="middle" font-size="11" fill="#9a3412">floor · cascade · fallback</text>

  <!-- Arrows to ladder (fan out, no crossings) -->
  <line x1="588" y1="112" x2="646" y2="70" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="588" y1="132" x2="646" y2="132" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="588" y1="152" x2="646" y2="194" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Model ladder -->
  <rect x="648" y="34" width="204" height="52" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="750" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Small model · $</text>
  <text x="750" y="74" text-anchor="middle" font-size="11" fill="#64748b">e.g. Qwen3-0.6B / 1.7B</text>

  <rect x="648" y="106" width="204" height="52" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="750" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#064e3b">Mid model · $$  ✓ chosen</text>
  <text x="750" y="146" text-anchor="middle" font-size="11" fill="#047857">good enough — 47–58% saved</text>

  <rect x="648" y="178" width="204" height="52" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="750" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Big / API model · $$$</text>
  <text x="750" y="218" text-anchor="middle" font-size="11" fill="#64748b">escalation &amp; fallback tier</text>

  <!-- PorTAL adapter box, directly below ladder, straight arrow up -->
  <rect x="588" y="272" width="264" height="62" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="720" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#581c87">PorTAL adapters</text>
  <text x="720" y="314" text-anchor="middle" font-size="11" fill="#7e22ce">one artifact → any task × any model size</text>
  <text x="720" y="328" text-anchor="middle" font-size="11" fill="#7e22ce">skill LoRA generated on the fly (~15 ms swap)</text>
  <line x1="720" y1="272" x2="720" y2="234" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowPurple)"/>

  <!-- Feedback loop: straight lines along the bottom, no crossings -->
  <rect x="198" y="272" width="290" height="62" rx="10" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="343" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#075985">Decision traces</text>
  <text x="343" y="314" text-anchor="middle" font-size="11" fill="#0369a1">model chosen · reason · cost · latency · outcome</text>
  <text x="343" y="328" text-anchor="middle" font-size="11" fill="#0369a1">routers retrained from real results</text>
  <line x1="503" y1="178" x2="503" y2="240" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="503" y1="240" x2="420" y2="240" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="420" y1="240" x2="420" y2="270" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="266" y1="272" x2="266" y2="240" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="266" y1="240" x2="266" y2="182" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
